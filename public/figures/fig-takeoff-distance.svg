<svg viewBox="0 0 640 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="640" height="500" fill="#f8f9fa"/>
  <text x="320" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">TAKEOFF DISTANCE — FLAPS UP</text>
  <text x="320" y="38" text-anchor="middle" font-size="10" fill="#475569">Figure 2 · Gross Weight 2,300 lbs · Paved, Level, Dry Runway · Full Throttle</text>

  <!-- Table header background -->
  <rect x="30" y="52" width="580" height="26" fill="#1e3a5f" rx="3"/>

  <!-- Column headers -->
  <text x="120" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="white">OAT</text>
  <text x="250" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Pressure Altitude</text>
  <text x="420" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Ground Roll</text>
  <text x="420" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="white">(ft)</text>
  <text x="555" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Total Over 50 ft</text>
  <text x="555" y="74" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Obstacle (ft)</text>

  <!-- Column dividers in header -->
  <line x1="170" y1="52" x2="170" y2="78" stroke="white" stroke-width="0.5"/>
  <line x1="330" y1="52" x2="330" y2="78" stroke="white" stroke-width="0.5"/>
  <line x1="490" y1="52" x2="490" y2="78" stroke="white" stroke-width="0.5"/>

  <!-- Row group: 0°C -->
  <rect x="30" y="78" width="580" height="19" fill="#dbeafe"/>
  <rect x="30" y="97" width="580" height="19" fill="white"/>
  <rect x="30" y="116" width="580" height="19" fill="#dbeafe"/>
  <rect x="30" y="135" width="580" height="19" fill="white"/>

  <!-- OAT label spanning 4 rows -->
  <rect x="30" y="78" width="140" height="76" fill="#eff6ff" stroke="#bfdbfe" stroke-width="0.5"/>
  <text x="100" y="123" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">0°C</text>
  <text x="100" y="138" text-anchor="middle" font-size="9" fill="#3b82f6">(32°F)</text>

  <text x="250" y="91" text-anchor="middle" font-size="10" fill="#1e293b">Sea Level</text>
  <text x="420" y="91" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">735</text>
  <text x="555" y="91" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">1,325</text>

  <text x="250" y="110" text-anchor="middle" font-size="10" fill="#1e293b">2,000 ft</text>
  <text x="420" y="110" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">880</text>
  <text x="555" y="110" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">1,575</text>

  <text x="250" y="129" text-anchor="middle" font-size="10" fill="#1e293b">4,000 ft</text>
  <text x="420" y="129" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">1,045</text>
  <text x="555" y="129" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">1,870</text>

  <text x="250" y="148" text-anchor="middle" font-size="10" fill="#1e293b">6,000 ft</text>
  <text x="420" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">1,265</text>
  <text x="555" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">2,255</text>

  <!-- Divider -->
  <line x1="30" y1="154" x2="610" y2="154" stroke="#94a3b8" stroke-width="1"/>

  <!-- Row group: 20°C -->
  <rect x="30" y="154" width="580" height="19" fill="#dcfce7"/>
  <rect x="30" y="173" width="580" height="19" fill="white"/>
  <rect x="30" y="192" width="580" height="19" fill="#dcfce7"/>
  <rect x="30" y="211" width="580" height="19" fill="white"/>

  <rect x="30" y="154" width="140" height="76" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.5"/>
  <text x="100" y="199" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">20°C</text>
  <text x="100" y="214" text-anchor="middle" font-size="9" fill="#22c55e">(68°F)</text>

  <text x="250" y="167" text-anchor="middle" font-size="10" fill="#1e293b">Sea Level</text>
  <text x="420" y="167" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">850</text>
  <text x="555" y="167" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">1,510</text>

  <text x="250" y="186" text-anchor="middle" font-size="10" fill="#1e293b">2,000 ft</text>
  <text x="420" y="186" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">1,010</text>
  <text x="555" y="186" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">1,790</text>

  <text x="250" y="205" text-anchor="middle" font-size="10" fill="#1e293b">4,000 ft</text>
  <text x="420" y="205" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">1,220</text>
  <text x="555" y="205" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">2,160</text>

  <text x="250" y="224" text-anchor="middle" font-size="10" fill="#1e293b">6,000 ft</text>
  <text x="420" y="224" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">1,480</text>
  <text x="555" y="224" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">2,645</text>

  <!-- Divider -->
  <line x1="30" y1="230" x2="610" y2="230" stroke="#94a3b8" stroke-width="1"/>

  <!-- Row group: 40°C -->
  <rect x="30" y="230" width="580" height="19" fill="#fef3c7"/>
  <rect x="30" y="249" width="580" height="19" fill="white"/>
  <rect x="30" y="268" width="580" height="19" fill="#fef3c7"/>
  <rect x="30" y="287" width="580" height="19" fill="white"/>

  <rect x="30" y="230" width="140" height="76" fill="#fffbeb" stroke="#fde68a" stroke-width="0.5"/>
  <text x="100" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">40°C</text>
  <text x="100" y="290" text-anchor="middle" font-size="9" fill="#d97706">(104°F)</text>

  <text x="250" y="243" text-anchor="middle" font-size="10" fill="#1e293b">Sea Level</text>
  <text x="420" y="243" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">985</text>
  <text x="555" y="243" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">1,720</text>

  <text x="250" y="262" text-anchor="middle" font-size="10" fill="#1e293b">2,000 ft</text>
  <text x="420" y="262" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">1,175</text>
  <text x="555" y="262" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">2,055</text>

  <text x="250" y="281" text-anchor="middle" font-size="10" fill="#1e293b">4,000 ft</text>
  <text x="420" y="281" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">1,430</text>
  <text x="555" y="281" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">2,510</text>

  <text x="250" y="300" text-anchor="middle" font-size="10" fill="#1e293b">6,000 ft</text>
  <text x="420" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">1,750</text>
  <text x="555" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">3,110</text>

  <!-- Column vertical lines -->
  <line x1="170" y1="78" x2="170" y2="306" stroke="#94a3b8" stroke-width="0.7"/>
  <line x1="330" y1="78" x2="330" y2="306" stroke="#94a3b8" stroke-width="0.7"/>
  <line x1="490" y1="78" x2="490" y2="306" stroke="#94a3b8" stroke-width="0.7"/>

  <!-- Outer table border -->
  <rect x="30" y="52" width="580" height="254" fill="none" stroke="#334155" stroke-width="1.5" rx="3"/>

  <!-- Notes section -->
  <rect x="30" y="322" width="580" height="160" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="45" y="340" font-size="10" font-weight="bold" fill="#1e293b">NOTES AND CORRECTIONS:</text>
  <text x="45" y="358" font-size="10" fill="#334155">• Reduce ground roll by 10% for each 9 knots of headwind</text>
  <text x="45" y="374" font-size="10" fill="#334155">• Increase ground roll by 10% for each 9 knots of tailwind</text>
  <text x="45" y="390" font-size="10" fill="#334155">• For dry grass runway: increase distances by 15%</text>
  <text x="45" y="406" font-size="10" fill="#334155">• Obstacle height other than 50 ft: add 10% per additional 50 ft</text>
  <text x="45" y="428" font-size="11" font-weight="bold" fill="#dc2626">Example: 4,000 ft PA, 20°C, 9 kt headwind → ground roll = 1,220 × 0.90 = 1,098 ft</text>
  <text x="45" y="446" font-size="11" font-weight="bold" fill="#15803d">Example: 40°C OAT, sea level, no wind → total to clear 50 ft obstacle = 1,720 ft</text>
  <text x="45" y="464" font-size="9" fill="#64748b">Red values indicate conditions requiring particular attention to available runway length.</text>
</svg>
