  <text x="130" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="Arial">3,000</text>
  <text x="198" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="Arial">6,000</text>
