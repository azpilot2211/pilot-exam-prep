  <line x1="164" y1="112" x2="164" y2="136" stroke="#64748b" stroke-width="0.5"/>
  <line x1="232" y1="112" x2="232" y2="136" stroke="#64748b" stroke-width="0.5"/>
  <line x1="300" y1="112" x2="300" y2="136" stroke="#64748b" stroke-width="0.5"/>
