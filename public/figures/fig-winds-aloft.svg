  <text x="60" y="181" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155" font-family="Arial">DEN</text>
  <text x="130" y="181" text-anchor="middle" font-size="11" fill="#334155">1508</text>
  <text x="198" y="181" text-anchor="middle" font-size="11" fill="#334155">2010-04</text>
  <text x="266" y="181" text-anchor="middle" font-size="11" fill="#334155">2318-15</text>
  <text x="334" y="181" text-anchor="middle" font-size="11" fill="#334155">2420-25</text>
  <text x="402" y="181" text-anchor="middle" font-size="11" fill="#334155">2535-39</text>
  <text x="470" y="181" text-anchor="middle" font-size="11" fill="#334155">2545-50</text>
  <text x="550" y="181" text-anchor="middle" font-size="11" fill="#94a3b8">2460-61</text>

