  <!-- Column dividers in data rows -->
  <line x1="96" y1="112" x2="96" y2="248" stroke="#cbd5e1" stroke-width="0.7"/>
  <line x1="164" y1="112" x2="164" y2="248" stroke="#cbd5e1" stroke-width="0.7"/>
  <line x1="232" y1="112" x2="232" y2="248" stroke="#cbd5e1" stroke-width="0.7"/>
  <line x1="300" y1="112" x2="300" y2="248" stroke="#cbd5e1" stroke-width="0.7"/>
  <line x1="368" y1="112" x2="368" y2="248" stroke="#cbd5e1" stroke-width="0.7"/>
  <line x1="436" y1="112" x2="436" y2="248" stroke="#cbd5e1" stroke-width="0.7"/>
  <line x1="504" y1="112" x2="504" y2="248" stroke="#cbd5e1" stroke-width="0.7"/>

  <!-- DECODING KEY -->
  <rect x="30" y="262" width="580" height="145" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="45" y="280" font-size="11" font-weight="bold" fill="#1e293b" font-family="Arial">HOW TO READ THE CODE:</text>

  <text x="45" y="298" font-size="10" fill="#334155" font-family="Arial">Format: DDSST  where  DD = wind direction (×10°),  SS = wind speed (kts),  T = temperature (°C)</text>
  <text x="45" y="314" font-size="10" fill="#334155" font-family="Arial">• Temperatures are negative above 24,000 ft (no sign shown above FL240)</text>
  <text x="45" y="330" font-size="10" fill="#334155" font-family="Arial">• At 3,000 ft: winds only — no temperature forecast provided</text>
  <text x="45" y="346" font-size="10" fill="#334155" font-family="Arial">• Wind speed of 9900 = light and variable</text>
  <text x="45" y="362" font-size="10" fill="#334155" font-family="Arial">• Wind speed ≥ 100 kts: add 50 to the direction digits and subtract 100 from speed</text>

  <!-- ABQ 9000 ft example callout -->
  <rect x="45" y="375" width="530" height="24" fill="#fef3c7" stroke="#fbbf24" stroke-width="1" rx="3"/>
  <text x="55" y="391" font-size="10" font-weight="bold" fill="#b45309" font-family="Arial">EXAMPLE (red highlight, ABQ 9,000 ft): "2925-18" = wind from 290° at 25 kts, temperature −18°C</text>
</svg>
