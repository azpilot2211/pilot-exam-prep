  <text x="130" y="153" text-anchor="middle" font-size="11" fill="#334155">2714</text>
  <text x="198" y="153" text-anchor="middle" font-size="11" fill="#334155">3120-08</text>
  <text x="266" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">2925-18</text>
