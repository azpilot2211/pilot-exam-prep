  <rect x="30" y="192" width="580" height="28" fill="#eff6ff"/>
  <text x="60" y="209" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155" font-family="Arial">OKC</text>
  <text x="130" y="209" text-anchor="middle" font-size="11" fill="#334155">2215</text>
