  <text x="60" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155" font-family="Arial">PHX</text>
  <text x="130" y="237" text-anchor="middle" font-size="11" fill="#334155">2406</text>
  <text x="198" y="237" text-anchor="middle" font-size="11" fill="#334155">2612+18</text>
