<svg viewBox="0 0 640 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="640" height="520" fill="#e4e8cc"/>

  <!-- Title -->
  <rect x="0" y="0" width="640" height="34" fill="#1e293b" opacity="0.9"/>
  <text x="320" y="14" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CLASS B AIRSPACE — SECTIONAL CHART EXCERPT</text>
  <text x="320" y="28" text-anchor="middle" font-size="9" fill="#94a3b8">Figure 8 · Dimensions in feet MSL · Not to scale · For training purposes only</text>

  <!-- Background terrain -->
  <rect x="0" y="34" width="640" height="486" fill="#e4e8cc"/>

  <!-- Outer Class B ring (solid blue boundary) — 20 nm radius ≈ 200px -->
  <circle cx="320" cy="270" r="200" fill="#bfdbfe" opacity="0.4" stroke="#1d4ed8" stroke-width="2.5"/>

  <!-- Middle Class B ring — 10 nm radius ≈ 130px -->
  <circle cx="320" cy="270" r="130" fill="#93c5fd" opacity="0.35" stroke="#1d4ed8" stroke-width="2.5"/>

  <!-- Inner Class B ring (surface) — 5 nm radius ≈ 70px -->
  <circle cx="320" cy="270" r="70" fill="#60a5fa" opacity="0.4" stroke="#1d4ed8" stroke-width="2.5"/>

  <!-- Primary airport at center -->
  <circle cx="320" cy="270" r="18" fill="#1d4ed8"/>
  <rect x="312" y="256" width="16" height="28" fill="white" rx="1"/>
  <rect x="302" y="264" width="36" height="12" fill="white" rx="1"/>
  <text x="320" y="256" text-anchor="middle" font-size="9" font-weight="bold" fill="white">KMET</text>

  <!-- Altitude labels for each ring -->
  <!-- Inner shelf: SFC to 10,000 MSL (placed in the inner ring, above center) -->
  <text x="320" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">100</text>
  <line x1="300" y1="225" x2="340" y2="225" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="320" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">SFC</text>
  <text x="320" y="250" text-anchor="middle" font-size="8" fill="#1d4ed8">(surface to 10,000 MSL)</text>

  <!-- Middle shelf: 3,000 to 10,000 MSL (placed within the middle ring, left of center) -->
  <text x="220" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">100</text>
  <line x1="202" y1="268" x2="238" y2="268" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="220" y="281" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">30</text>
  <text x="220" y="294" text-anchor="middle" font-size="8" fill="#1d4ed8">(3,000–10,000 MSL)</text>

  <!-- Outer shelf: 5,000 to 10,000 MSL (placed within the outer ring, right of center) -->
  <text x="465" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">100</text>
  <line x1="445" y1="225" x2="485" y2="225" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="465" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">50</text>
  <text x="465" y="250" text-anchor="middle" font-size="8" fill="#1d4ed8">(5,000–10,000 MSL)</text>

  <!-- Point A marker (in outer ring, lower-left) -->
  <circle cx="168" cy="340" r="14" fill="#dc2626" stroke="white" stroke-width="2"/>
  <text x="168" y="344" text-anchor="middle" font-size="11" font-weight="bold" fill="white">A</text>
  <!-- Point A annotation -->
  <line x1="168" y1="354" x2="120" y2="362" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="30" y="356" width="194" height="64" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" rx="4"/>
  <text x="42" y="374" font-size="10" font-weight="bold" fill="#dc2626">POINT A</text>
  <text x="42" y="390" font-size="9" fill="#334155">Located in: OUTER ring</text>
  <text x="42" y="404" font-size="9" fill="#334155">Floor: 5,000 ft MSL</text>
  <text x="42" y="416" font-size="9" fill="#334155">Ceiling: 10,000 ft MSL</text>

  <!-- Point B marker (in middle ring, upper right) -->
  <circle cx="400" cy="175" r="14" fill="#7c3aed" stroke="white" stroke-width="2"/>
  <text x="400" y="179" text-anchor="middle" font-size="11" font-weight="bold" fill="white">B</text>
  <!-- Point B annotation -->
  <line x1="400" y1="168" x2="414" y2="158" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="410" y="110" width="194" height="64" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1" rx="4"/>
  <text x="422" y="128" font-size="10" font-weight="bold" fill="#7c3aed">POINT B</text>
  <text x="422" y="144" font-size="9" fill="#334155">Located in: MIDDLE ring</text>
  <text x="422" y="158" font-size="9" fill="#334155">Floor: 3,000 ft MSL</text>
  <text x="422" y="170" font-size="9" fill="#334155">Ceiling: 10,000 ft MSL</text>

  <!-- Scale ring labels on boundary arcs -->
  <text x="320" y="344" text-anchor="middle" font-size="8" fill="#1d4ed8">← ~5 NM →</text>
  <text x="320" y="408" text-anchor="middle" font-size="8" fill="#1d4ed8">←——— ~10 NM ———→</text>
  <text x="320" y="479" text-anchor="middle" font-size="8" fill="#1d4ed8">←—————— ~20 NM ——————→</text>

  <!-- Format key for altitude labels -->
  <rect x="30" y="428" width="580" height="82" fill="#f8f9fa" fill-opacity="0.97" stroke="#1d4ed8" stroke-width="1.5" rx="4"/>
  <text x="45" y="446" font-size="10" font-weight="bold" fill="#1d4ed8">HOW TO READ CLASS B ALTITUDE LABELS:</text>
  <text x="45" y="462" font-size="10" fill="#334155">The stacked number format  TOP/BOTTOM  shows: TOP = ceiling (×100 ft MSL) · BOTTOM = floor (×100 ft or SFC)</text>
  <text x="45" y="478" font-size="10" fill="#334155">Example:  "100/30" = 10,000 ft MSL ceiling / 3,000 ft MSL floor  ·  "100/SFC" = 10,000 ft MSL ceiling / surface</text>
  <text x="45" y="498" font-size="10" font-weight="bold" fill="#dc2626">All aircraft operating within Class B airspace MUST have an ATC clearance (14 CFR 91.131)</text>
</svg>
